name: Gym Scraper Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Přidá tlačítko "Run workflow", abys mohl testovat ručně

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome and dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4

      - name: Run scraper
        run: python google_scraper.py