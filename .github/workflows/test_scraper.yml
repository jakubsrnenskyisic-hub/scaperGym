name: Gym Scraper Test

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # <--- AKTIVUJE RUČNÍ TLAČÍTKO

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nutné pro nahrání data.json zpět
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4

      - name: Run scraper
        run: python google_scraper.py

      - name: Save results to repo
        run: |
          git config --global user.name "GymBot"
          git config --global user.email "bot@gym.cz"
          git add data.json
          # Commitne jen pokud se data změnila, jinak neudělá nic
          git commit -m "Update gym data [skip ci]" || exit 0
          git push

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: google-debug-screenshots
          path: debug_*.png