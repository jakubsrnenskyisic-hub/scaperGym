name: Gym Scraper

on:
  schedule:
    - cron: '0 * * * *' # Každou hodinu
  workflow_dispatch: # Možnost pustit ručně

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          pip install undetected-chromedriver beautifulsoup4 selenium

      - name: Run scraper
        run: python google_scraper.py

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-debug-screenshots
          path: ./*.png

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aktualizace obsazenosti [automated]" && git push)